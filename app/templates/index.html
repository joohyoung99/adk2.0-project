<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>냉털쉐프</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --chef-cream: #fff8ea;
      --chef-ink: #27312f;
      --chef-green: #1f7a5c;
      --chef-mint: #d9f4df;
      --chef-orange: #ffb44f;
    }

    body {
      min-height: 100vh;
      color: var(--chef-ink);
      background:
        radial-gradient(circle at top left, rgba(255, 180, 79, 0.22), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(31, 122, 92, 0.18), transparent 34rem),
        var(--chef-cream);
    }

    .navbar {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(14px);
    }

    .brand-mark {
      display: inline-grid;
      width: 2.75rem;
      height: 2.75rem;
      place-items: center;
      border-radius: 999px;
      background: var(--chef-mint);
      box-shadow: inset 0 -0.25rem 0 rgba(31, 122, 92, 0.08);
    }

    .brand-mark svg {
      width: 1.65rem;
      height: 1.65rem;
    }

    .shell-card {
      border: 0;
      border-radius: 1.5rem;
      box-shadow: 0 1.25rem 3rem rgba(39, 49, 47, 0.12);
    }

    .chat-container {
      height: calc(100vh - 15.5rem);
      min-height: 26rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      padding: 1rem;
    }

    .fridge-panel {
      height: calc(100vh - 12rem);
      min-height: 26rem;
      overflow-y: auto;
      position: relative;
      border-radius: 0 0 1.5rem 1.5rem;
      background:
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(31, 122, 92, 0.26) calc(50% - 1px), rgba(31, 122, 92, 0.26) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(90deg, rgba(247, 255, 248, 0.96) 0 50%, rgba(238, 250, 242, 0.96) 50% 100%);
      box-shadow: inset 0 0 0 1px rgba(31, 122, 92, 0.08);
    }

    .fridge-panel::before,
    .fridge-panel::after {
      content: "";
      position: absolute;
      top: 4.25rem;
      width: 0.35rem;
      height: 4.25rem;
      border-radius: 999px;
      background: rgba(31, 122, 92, 0.42);
      z-index: 0;
    }

    .fridge-panel::before {
      left: calc(50% - 1.1rem);
    }

    .fridge-panel::after {
      right: calc(50% - 1.1rem);
    }

    .bubble-user,
    .bubble-agent {
      max-width: min(82%, 44rem);
    }

    .bubble-user {
      align-self: flex-end;
    }

    .bubble-agent {
      align-self: flex-start;
    }

    .bubble-user > div,
    .bubble-agent > div {
      border-radius: 1.25rem;
    }

    .bubble-user > div {
      background: linear-gradient(135deg, var(--chef-green), #2f9c73);
    }

    .fridge-item {
      position: relative;
      z-index: 1;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(31, 122, 92, 0.08);
      box-shadow: 0 0.65rem 1.35rem rgba(31, 122, 92, 0.08);
    }

    .agent-markdown > :last-child {
      margin-bottom: 0;
    }

    .agent-markdown hr {
      margin: 0.85rem 0;
      opacity: 0.14;
    }

    .agent-markdown ol,
    .agent-markdown ul {
      padding-left: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .recipe-image img {
      display: block;
      width: min(100%, 28rem);
      max-height: 18rem;
      object-fit: cover;
      border-radius: 1rem;
      margin-bottom: 0.35rem;
    }

    #chat-input {
      resize: none;
    }
  </style>
</head>
<body>
  <nav class="navbar border-bottom px-3 py-3">
    <div class="container-fluid">
      <span class="navbar-brand d-flex align-items-center gap-3 mb-0 fw-bold">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <rect x="8" y="3" width="16" height="26" rx="3" fill="#f7fff8" stroke="#1f7a5c" stroke-width="2"/>
            <path d="M8 13h16" stroke="#1f7a5c" stroke-width="2"/>
            <path d="M19 7v3M19 17v6" stroke="#ff9f1c" stroke-width="2" stroke-linecap="round"/>
            <circle cx="13" cy="23" r="1.5" fill="#1f7a5c"/>
            <circle cx="19" cy="23" r="1.5" fill="#1f7a5c"/>
          </svg>
        </span>
        냉털쉐프
      </span>
      <span class="text-muted small" id="session-label"></span>
    </div>
  </nav>

  <main class="container-fluid py-3">
    <div class="row g-3">
      <section class="col-lg-4">
        <div class="card shell-card h-100">
          <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3 px-3">
            <div>
              <strong>냉장고 재고</strong>
              <div class="text-muted small">오늘 쓸 만한 재료를 먼저 보여드려요.</div>
            </div>
            <button class="btn btn-sm btn-outline-success rounded-pill" type="button" onclick="loadFridge()">새로고침</button>
          </div>
          <div class="card-body fridge-panel p-3" id="fridge-list">
            <div class="text-center text-muted py-4">
              <div class="spinner-border spinner-border-sm" role="status"></div>
              <div class="mt-2 small">재고 로딩 중...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="col-lg-8">
        <div class="card shell-card">
          <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3 px-3">
            <div>
              <strong>레시피 상담</strong>
              <div class="text-muted small">재료, 시간, 도구를 말하면 맞춰서 추천합니다.</div>
            </div>
            <button class="btn btn-sm btn-outline-danger rounded-pill" type="button" onclick="resetSession()">새 대화</button>
          </div>
          <div class="chat-container" id="chat-container">
            <div class="bubble-agent">
              <div class="bg-white border p-3">
                안녕하세요! 냉털쉐프입니다.<br>
                냉장고에 있는 재료나 먹고 싶은 메뉴를 알려주세요.
              </div>
            </div>
          </div>
          <div class="card-footer bg-white border-0 p-3">
            <div class="input-group">
              <textarea
                id="chat-input"
                class="form-control"
                rows="2"
                placeholder="예: 계란이랑 김치 있는데 점심 뭐 만들지?"
              ></textarea>
              <button class="btn btn-success px-4" id="send-btn" type="button" onclick="sendMessage()">전송</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="/static/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
