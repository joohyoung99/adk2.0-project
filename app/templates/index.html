<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>냉털쉐프</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* ── Design tokens (Starbucks-inspired) ── */
    :root {
      --green-starbucks: #006241;
      --green-accent:    #00754A;
      --green-house:     #1E3932;
      --green-light:     #d4e9e2;
      --canvas:          #f2f0eb;
      --ceramic:         #edebe9;
      --text-black:      rgba(0,0,0,.87);
      --text-soft:       rgba(0,0,0,.58);
      --text-white:      #ffffff;
      --text-white-soft: rgba(255,255,255,.70);
      --card-radius:     12px;
      --btn-radius:      50px;
      --card-shadow:     0 0 .5px rgba(0,0,0,.14), 0 1px 1px rgba(0,0,0,.24);
      --nav-shadow:      0 1px 3px rgba(0,0,0,.10), 0 2px 2px rgba(0,0,0,.06), 0 0 2px rgba(0,0,0,.07);
      --tracking:        -0.01em;
    }

    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: var(--tracking);
      color: var(--text-black);
      background-color: var(--canvas);
      min-height: 100vh;
    }

    /* ── Navbar (House Green) ── */
    .app-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--green-house);
      box-shadow: var(--nav-shadow);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-white);
      letter-spacing: var(--tracking);
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .nav-session {
      font-size: .8125rem;
      color: var(--text-white-soft);
      letter-spacing: var(--tracking);
    }

    /* ── Main canvas ── */
    .app-main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1.5rem;
      height: calc(100vh - 64px);
    }

    @media (max-width: 768px) {
      .app-main { grid-template-columns: 1fr; height: auto; }
    }

    /* ── Card ── */
    .card-panel {
      background: #ffffff;
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card-head {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--ceramic);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }

    .card-head-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--green-starbucks);
      letter-spacing: var(--tracking);
      margin: 0;
    }

    .card-head-sub {
      font-size: .8125rem;
      color: var(--text-soft);
      margin: .15rem 0 0;
    }

    /* ── Buttons (full-pill, scale active) ── */
    .btn-primary-pill {
      background: var(--green-accent);
      color: #fff;
      border: 1px solid var(--green-accent);
      border-radius: var(--btn-radius);
      padding: 7px 18px;
      font-size: .875rem;
      font-weight: 600;
      letter-spacing: var(--tracking);
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
      line-height: 1.4;
    }
    .btn-primary-pill:hover  { background: #005f3b; border-color: #005f3b; }
    .btn-primary-pill:active { transform: scale(.95); }
    .btn-primary-pill:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .btn-outline-pill {
      background: transparent;
      color: var(--green-accent);
      border: 1px solid var(--green-accent);
      border-radius: var(--btn-radius);
      padding: 7px 18px;
      font-size: .875rem;
      font-weight: 600;
      letter-spacing: var(--tracking);
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
      line-height: 1.4;
    }
    .btn-outline-pill:hover  { background: var(--green-light); }
    .btn-outline-pill:active { transform: scale(.95); }

    .btn-danger-pill {
      background: transparent;
      color: #c82014;
      border: 1px solid #c82014;
      border-radius: var(--btn-radius);
      padding: 7px 18px;
      font-size: .875rem;
      font-weight: 600;
      letter-spacing: var(--tracking);
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
      line-height: 1.4;
    }
    .btn-danger-pill:hover  { background: #fdf0ef; }
    .btn-danger-pill:active { transform: scale(.95); }

    /* ── 냉장고 패널 ── */
    .fridge-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      background: var(--canvas);
    }

    .fridge-item {
      background: #ffffff;
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      padding: .875rem 1rem;
      margin-bottom: .75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .fridge-item-name {
      font-size: .9375rem;
      font-weight: 600;
      color: var(--text-black);
      letter-spacing: var(--tracking);
    }

    .fridge-item-meta {
      font-size: .8125rem;
      color: var(--text-soft);
      margin-top: .1rem;
    }

    /* freshness badges */
    .badge-fresh   { background: var(--green-accent); color: #fff; }
    .badge-warn    { background: #fbbc05; color: rgba(0,0,0,.87); }
    .badge-danger  { background: #c82014; color: #fff; }

    .freshness-badge {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .02em;
      padding: 3px 10px;
      border-radius: var(--btn-radius);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── 채팅 패널 ── */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: var(--canvas);
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: min(80%, 42rem);
    }
    .bubble-wrap.user  { align-self: flex-end; align-items: flex-end; }
    .bubble-wrap.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      border-radius: var(--card-radius);
      padding: .875rem 1.125rem;
      font-size: .9375rem;
      line-height: 1.55;
      letter-spacing: var(--tracking);
    }

    .bubble.user {
      background: var(--green-accent);
      color: #ffffff;
      border-radius: var(--card-radius) var(--card-radius) 4px var(--card-radius);
    }

    .bubble.agent {
      background: #ffffff;
      color: var(--text-black);
      box-shadow: var(--card-shadow);
      border-radius: 4px var(--card-radius) var(--card-radius) var(--card-radius);
    }

    /* route badge above agent bubble */
    .route-badge {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .03em;
      padding: 3px 12px;
      border-radius: var(--btn-radius);
      margin-bottom: .45rem;
      display: inline-block;
    }
    .route-cook       { background: var(--green-accent); color: #fff; }
    .route-sub        { background: #fbbc05; color: rgba(0,0,0,.87); }
    .route-shop       { background: #1a73e8; color: #fff; }

    /* markdown inside agent bubble */
    .agent-md { color: var(--text-black); }
    .agent-md > :last-child { margin-bottom: 0; }
    .agent-md h3, .agent-md h4 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--green-starbucks);
      margin: .9rem 0 .35rem;
      letter-spacing: var(--tracking);
    }
    .agent-md p  { margin-bottom: .6rem; }
    .agent-md ul,
    .agent-md ol { padding-left: 1.25rem; margin-bottom: .6rem; }
    .agent-md li { margin-bottom: .25rem; }
    .agent-md strong { color: var(--text-black); }
    .agent-md table {
      font-size: .875rem;
      border-collapse: collapse;
      width: 100%;
      margin-bottom: .6rem;
    }
    .agent-md th, .agent-md td {
      border: 1px solid var(--ceramic);
      padding: .35rem .6rem;
      text-align: left;
    }
    .agent-md th { background: var(--canvas); font-weight: 600; }
    .agent-md hr { border-color: var(--ceramic); margin: .75rem 0; }

    /* thinking animation */
    .thinking-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-soft);
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: .2s; }
    .thinking-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .2; transform: scale(.8); }
      40%            { opacity: 1;  transform: scale(1); }
    }

    /* ── 입력창 ── */
    .chat-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--ceramic);
      background: #ffffff;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: .75rem;
      align-items: flex-end;
    }

    #chat-input {
      flex: 1;
      border: 1px solid var(--ceramic);
      border-radius: var(--card-radius);
      padding: .75rem 1rem;
      font-family: inherit;
      font-size: .9375rem;
      letter-spacing: var(--tracking);
      color: var(--text-black);
      background: var(--canvas);
      resize: none;
      transition: border-color .2s ease;
      line-height: 1.5;
    }
    #chat-input:focus {
      outline: none;
      border-color: var(--green-accent);
      background: #fff;
    }

    /* ── 공통 유틸 ── */
    .empty-state {
      color: var(--text-soft);
      font-size: .875rem;
      text-align: center;
      padding: 3rem 1rem;
    }
    .spinner-sm {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 상단 네비 (House Green) -->
  <nav class="app-nav">
    <span class="nav-brand">🧊 냉털쉐프</span>
    <span class="nav-session" id="session-label"></span>
  </nav>

  <!-- 메인 그리드 -->
  <main class="app-main">

    <!-- 냉장고 패널 -->
    <div class="card-panel">
      <div class="card-head">
        <div>
          <p class="card-head-title">냉장고 재고</p>
          <p class="card-head-sub">오늘 쓸 만한 재료예요.</p>
        </div>
        <button class="btn-outline-pill" onclick="loadFridge()">새로고침</button>
      </div>
      <div class="fridge-body" id="fridge-list">
        <div class="empty-state">
          <div class="spinner-border spinner-border-sm text-secondary mb-2" role="status"></div>
          <div>재고 로딩 중…</div>
        </div>
      </div>
    </div>

    <!-- 채팅 패널 -->
    <div class="card-panel">
      <div class="card-head">
        <div>
          <p class="card-head-title">레시피 상담</p>
          <p class="card-head-sub">재료·시간·도구를 말하면 맞춰 추천해드려요.</p>
        </div>
        <button class="btn-danger-pill" onclick="resetSession()">새 대화</button>
      </div>

      <div class="chat-body" id="chat-container">
        <div class="bubble-wrap agent">
          <div class="bubble agent">
            안녕하세요! 냉털쉐프입니다. 🍳<br>
            냉장고에 있는 재료나 먹고 싶은 메뉴를 알려주세요.
          </div>
        </div>
      </div>

      <div class="chat-footer">
        <div class="input-row">
          <textarea
            id="chat-input"
            rows="2"
            placeholder="예: 계란이랑 김치 있는데 점심 뭐 만들지?"
          ></textarea>
          <button class="btn-primary-pill" id="send-btn" onclick="sendMessage()">전송</button>
        </div>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
